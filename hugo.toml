baseurl = "https://simeonivanov.org/"
title = "Simeon Ivanov"
theme = "sivanov"
languagecode = "en"
defaultcontentlanguage = "en"

[pagination]
pagerSize = 15

[markup.highlight]
noClasses = false

[markup.goldmark.renderer]
unsafe = true

[markup.tableOfContents]
startLevel = 2
endLevel = 4

# ──────────────────────────────────────────────
# Output formats — JSON required for search
# ──────────────────────────────────────────────
[outputs]
home = ["HTML", "RSS", "JSON"]

[taxonomies]
category = "categories"
series = "series"
tag = "tags"

# ──────────────────────────────────────────────
# Site params
# ──────────────────────────────────────────────
[params]
env = "production"
author = "Simeon Ivanov"
mainSections = ["posts"]
description = "DevOps · Kubernetes · Homelab · Security · Linux"
keywords = ["devops", "kubernetes", "homelab", "security", "linux", "blog"]

[params.assets]
favicon = "/favicon.svg"
favicon16x16 = "/favicon.svg"
favicon32x32 = "/favicon.svg"
theme_color = "#1a1b26"
msapplication_TileColor = "#1a1b26"

# Dark mode by default
defaultTheme = "dark"
disableThemeToggle = false

ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = false
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
ShowToc = true
TocOpen = false
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false

# ──────────────────────────────────────────────
# Homepage — Home-Info mode
# ──────────────────────────────────────────────
[params.homeInfoParams]
Title = "Hi, I'm Simeon 👋"
Content = """
Systems administrator walking the DevOps path. \
I write about Kubernetes, homelab infrastructure, Linux, and security. \
Everything I build and break ends up here.
"""

# ──────────────────────────────────────────────
# Social icons (shown below bio on homepage)
# ──────────────────────────────────────────────
[[params.socialIcons]]
name = "github"
url = "https://github.com/sivanov1994"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/simeonivanov1994/"

[[params.socialIcons]]
name = "email"
url = "mailto:s.ivanov1994@proton.me"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

# ──────────────────────────────────────────────
# Navigation menu
# ──────────────────────────────────────────────
[[menu.main]]
name = "About"
url = "/about/"
weight = 1

[[menu.main]]
name = "Posts"
url = "/posts/"
weight = 2

[[menu.main]]
name = "Tags"
url = "/tags/"
weight = 3

[[menu.main]]
name = "Archive"
url = "/archives/"
weight = 4

[[menu.main]]
name = "Search"
url = "/search/"
weight = 5
